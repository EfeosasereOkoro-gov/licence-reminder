name: Deploy to GitHub Pages

# Build all three branches on every push and deploy them as one Pages
# artifact, so each branch keeps its own URL:
#
#   master   -> https://efeosasereokoro-gov.github.io/licence-reminder/
#   staging  -> https://efeosasereokoro-gov.github.io/licence-reminder/staging/
#   calendar -> https://efeosasereokoro-gov.github.io/licence-reminder/calendar/
#
# GitHub Pages replaces the entire site on every deploy, so we always
# rebuild every branch — otherwise a push to one would wipe the others.
# Each branch is built from its own checkout with the right `--base` so
# asset URLs resolve under the correct sub-path.

on:
  push:
    branches: ["master", "staging", "calendar"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          path: master-src

      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging-src

      - name: Checkout calendar
        uses: actions/checkout@v4
        with:
          ref: calendar
          path: calendar-src

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            master-src/Downloads/renew-reminder/package-lock.json
            staging-src/Downloads/renew-reminder/package-lock.json
            calendar-src/Downloads/renew-reminder/package-lock.json

      - name: Install master dependencies
        working-directory: master-src/Downloads/renew-reminder
        run: npm ci

      - name: Build master (base = /licence-reminder/)
        working-directory: master-src/Downloads/renew-reminder
        run: npm run build

      - name: Install staging dependencies
        working-directory: staging-src/Downloads/renew-reminder
        run: npm ci

      - name: Build staging (base = /licence-reminder/staging/)
        working-directory: staging-src/Downloads/renew-reminder
        run: npm run build -- --base=/licence-reminder/staging/

      - name: Install calendar dependencies
        working-directory: calendar-src/Downloads/renew-reminder
        run: npm ci

      - name: Build calendar (base = /licence-reminder/calendar/)
        working-directory: calendar-src/Downloads/renew-reminder
        run: npm run build -- --base=/licence-reminder/calendar/

      - name: Combine into single Pages artifact
        run: |
          set -eux
          mkdir -p combined
          cp -r master-src/Downloads/renew-reminder/dist/. combined/
          mkdir -p combined/staging
          cp -r staging-src/Downloads/renew-reminder/dist/. combined/staging/
          mkdir -p combined/calendar
          cp -r calendar-src/Downloads/renew-reminder/dist/. combined/calendar/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
